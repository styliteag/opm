# HTTP-only nginx config for the Greenbone Security Assistant (GSA) web UI.
#
# Replaces the auto-generated config from the `gvm-config` container, which
# forces HTTPS on port 9392. Used by `compose-gvm.yml` — bind-mounted into
# the nginx service at /etc/nginx/conf.d/default.conf.
#
# Layout:
#   /                   → static frontend served from /usr/share/nginx/html
#                         (mounted from the `gsa` volume)
#   /gmp, /login, ...   → proxied to gsad (the API daemon) on port 80
#
# To re-enable HTTPS, switch back to the `gvm-config` generated config by
# restoring the original nginx service definition from git history.

server {
    listen 9392 default_server;
    listen [::]:9392 default_server;

    # Use Docker's embedded DNS resolver so `gsad` is looked up at request
    # time, not at startup. Without this nginx resolves upstream hostnames
    # once on boot via the `upstream` block and crashes with "host not
    # found in upstream" if gsad hasn't joined the network yet — fatal,
    # because `restart: unless-stopped` then loops forever.
    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 128M;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # GSA API endpoints handled by gsad
    location ~ ^/(gmp|login|logout|system_report|help)(/.*)?$ {
        # Variable in proxy_pass forces per-request DNS resolution via the
        # `resolver` directive above.
        set $gsad_upstream gsad:80;
        proxy_pass http://$gsad_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_connect_timeout 90s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA frontend: serve static assets, fall back to index.html for client routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
