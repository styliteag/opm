# Greenbone (GVM) scanner stack for STYLiTE Orbit Monitor.
#
# Based on the official Greenbone Community Edition compose file
# (https://greenbone.github.io/docs/latest/22.4/container/index.html)
# plus the OPM scanner agent that bridges gvmd ↔ OPM backend.
#
# IMAGE REGISTRY:
#   Images are pulled from the Greenbone community registry:
#     registry.community.greenbone.net/community/...
#   A GitHub Container Registry mirror exists at `ghcr.io/greenbone/...` but
#   does NOT publish every image (feed-data, pg-gvm, etc.) — swapping the
#   prefix will cause "manifest unknown" errors for some services, so stick
#   with the community registry unless you have a specific reason not to.
#
# NOTE ON THE WEB UI (GSA):
#   In 24.10 Greenbone split the monolithic `gsa` image into three parts:
#     1. `gsa`   → one-shot image that copies static web assets to a shared
#                  volume, signals ready via `/run/gsa/copying.done`, then idles
#     2. `gsad`  → HTTP API daemon that talks to gvmd over a Unix socket
#     3. `nginx` → serves the static frontend + reverse-proxies the API
#   Running `gsa:stable` as a daemon by itself segfaults — this is expected.
#   The upstream pattern below is the only supported setup.
#
# Prerequisites:
#   1. Main OPM stack must be running (compose.yml or compose-dev.yml)
#   2. Create a Scanner record in OPM and note the API key
#   3. Set GVM_SCANNER_API_KEY in your environment or .env file
#
# Usage:
#   docker compose -f compose-gvm.yml up -d
#
# For production, comment out the scanner build block and use the image line:
#   image: styliteag/opm-scanner-gvm:latest
#   GVM_BACKEND_URL=http://app:80
#
# NETWORKS:
#   `opm-network` is only required in the dev setup (compose-dev.yml) where
#   the backend lives in a separate compose project. In production (compose.yml)
#   the OPM services run in the same project and the default network covers it,
#   so the external `opm-network` attachment on opm-scanner-gvm is a no-op but
#   harmless — it stays here so the same file works in both environments.
#
# First startup downloads vulnerability feeds — this can take a long time.
# Monitor feed sync: docker compose -f compose-gvm.yml logs -f gvmd

name: greenbone-community-edition

services:
  # ── GVM Feed Data ──────────────────────────────────────────────────────
  vulnerability-tests:
    image: registry.community.greenbone.net/community/vulnerability-tests
    # image: ghcr.io/greenbone/vulnerability-tests
    environment:
      FEED_RELEASE: "24.10"
      KEEP_ALIVE: 1
    volumes:
      - vt_data_vol:/mnt

  notus-data:
    image: registry.community.greenbone.net/community/notus-data
    # image: ghcr.io/greenbone/notus-data
    environment:
      KEEP_ALIVE: 1
    volumes:
      - notus_data_vol:/mnt

  scap-data:
    image: registry.community.greenbone.net/community/scap-data
    # image: ghcr.io/greenbone/scap-data
    environment:
      KEEP_ALIVE: 1
    volumes:
      - scap_data_vol:/mnt

  cert-bund-data:
    image: registry.community.greenbone.net/community/cert-bund-data
    # image: ghcr.io/greenbone/cert-bund-data
    environment:
      KEEP_ALIVE: 1
    volumes:
      - cert_data_vol:/mnt

  dfn-cert-data:
    image: registry.community.greenbone.net/community/dfn-cert-data
    # image: ghcr.io/greenbone/dfn-cert-data
    environment:
      KEEP_ALIVE: 1
    volumes:
      - cert_data_vol:/mnt
    depends_on:
      cert-bund-data:
        condition: service_healthy

  data-objects:
    image: registry.community.greenbone.net/community/data-objects
    # image: ghcr.io/greenbone/data-objects
    environment:
      FEED_RELEASE: "24.10"
      KEEP_ALIVE: 1
    volumes:
      - data_objects_vol:/mnt

  report-formats:
    image: registry.community.greenbone.net/community/report-formats
    # image: ghcr.io/greenbone/report-formats
    environment:
      FEED_RELEASE: "24.10"
      KEEP_ALIVE: 1
    volumes:
      - data_objects_vol:/mnt
    depends_on:
      data-objects:
        condition: service_healthy

  gpg-data:
    image: registry.community.greenbone.net/community/gpg-data
    # image: ghcr.io/greenbone/gpg-data
    volumes:
      - gpg_data_vol:/mnt

  # ── GVM Infrastructure ─────────────────────────────────────────────────
  redis-server:
    image: registry.community.greenbone.net/community/redis-server
    # image: ghcr.io/greenbone/redis-server
    restart: unless-stopped
    volumes:
      - redis_socket_vol:/run/redis/

  pg-gvm-migrator:
    image: registry.community.greenbone.net/community/pg-gvm-migrator:stable
    # image: ghcr.io/greenbone/pg-gvm-migrator:stable
    restart: "no"
    volumes:
      - psql_data_vol:/var/lib/postgresql
      - psql_socket_vol:/var/run/postgresql

  pg-gvm:
    image: registry.community.greenbone.net/community/pg-gvm:stable
    # image: ghcr.io/greenbone/pg-gvm:stable
    restart: unless-stopped
    volumes:
      - psql_data_vol:/var/lib/postgresql
      - psql_socket_vol:/var/run/postgresql
    depends_on:
      pg-gvm-migrator:
        condition: service_completed_successfully

  # ── GVM Core Services ──────────────────────────────────────────────────
  gvmd:
    image: registry.community.greenbone.net/community/gvmd:stable
    # image: ghcr.io/greenbone/gvmd:stable
    restart: unless-stopped
    volumes:
      - gvmd_data_vol:/var/lib/gvm
      - scap_data_vol:/var/lib/gvm/scap-data/
      - cert_data_vol:/var/lib/gvm/cert-data
      - data_objects_vol:/var/lib/gvm/data-objects/gvmd
      - vt_data_vol:/var/lib/openvas/plugins
      - psql_data_vol:/var/lib/postgresql
      - gvmd_socket_vol:/run/gvmd
      - ospd_openvas_socket_vol:/run/ospd
      - psql_socket_vol:/var/run/postgresql
    depends_on:
      pg-gvm:
        condition: service_started
      scap-data:
        condition: service_healthy
      cert-bund-data:
        condition: service_healthy
      dfn-cert-data:
        condition: service_healthy
      data-objects:
        condition: service_healthy
      report-formats:
        condition: service_healthy

  configure-openvas:
    image: registry.community.greenbone.net/community/openvas-scanner:stable
    # image: ghcr.io/greenbone/openvas-scanner:stable
    volumes:
      - openvas_data_vol:/mnt
      - openvas_log_data_vol:/var/log/openvas
    command:
      - /bin/sh
      - -c
      - |
        printf "table_driven_lsc = yes\nopenvasd_server = http://openvasd:80\n" > /mnt/openvas.conf
        sed "s/127/128/" /etc/openvas/openvas_log.conf | sed 's/gvm/openvas/' > /mnt/openvas_log.conf
        chmod 644 /mnt/openvas.conf
        chmod 644 /mnt/openvas_log.conf
        touch /var/log/openvas/openvas.log
        chmod 666 /var/log/openvas/openvas.log

  openvasd:
    image: registry.community.greenbone.net/community/openvas-scanner:stable
    # image: ghcr.io/greenbone/openvas-scanner:stable
    restart: unless-stopped
    environment:
      OPENVASD_MODE: service_notus
      GNUPGHOME: /etc/openvas/gnupg
      LISTENING: 0.0.0.0:80
    volumes:
      - openvas_data_vol:/etc/openvas
      - openvas_log_data_vol:/var/log/openvas
      - gpg_data_vol:/etc/openvas/gnupg
      - notus_data_vol:/var/lib/notus
    depends_on:
      vulnerability-tests:
        condition: service_healthy
      notus-data:
        condition: service_healthy
      configure-openvas:
        condition: service_completed_successfully
      gpg-data:
        condition: service_completed_successfully
    networks:
      default:
        aliases:
          - openvasd

  ospd-openvas:
    image: registry.community.greenbone.net/community/ospd-openvas:stable
    # image: ghcr.io/greenbone/ospd-openvas:stable
    restart: unless-stopped
    hostname: ospd-openvas.local
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    command:
      [
        "ospd-openvas", "-f",
        "--config", "/etc/gvm/ospd-openvas.conf",
        "--notus-feed-dir", "/var/lib/notus/advisories",
        "-m", "666",
      ]
    volumes:
      - gpg_data_vol:/etc/openvas/gnupg
      - vt_data_vol:/var/lib/openvas/plugins
      - notus_data_vol:/var/lib/notus
      - ospd_openvas_socket_vol:/run/ospd
      - redis_socket_vol:/run/redis/
      - openvas_data_vol:/etc/openvas/
      - openvas_log_data_vol:/var/log/openvas
    depends_on:
      redis-server:
        condition: service_started
      gpg-data:
        condition: service_completed_successfully
      configure-openvas:
        condition: service_completed_successfully
      vulnerability-tests:
        condition: service_healthy
      notus-data:
        condition: service_healthy

  gvm-tools:
    image: registry.community.greenbone.net/community/gvm-tools
    # image: ghcr.io/greenbone/gvm-tools
    volumes:
      - gvmd_socket_vol:/run/gvmd
      - ospd_openvas_socket_vol:/run/ospd
    depends_on:
      - gvmd
      - ospd-openvas

  # ── GVM Web UI (GSA) ───────────────────────────────────────────────────
  # Three-part pattern: gsa (static assets) → gsad (HTTP API) → nginx (frontend+proxy)
  gsa:
    image: registry.community.greenbone.net/community/gsa:stable-slim
    # image: ghcr.io/greenbone/gsa:stable-slim
    environment:
      MOUNT_PATH: "/mnt/web"
      KEEP_ALIVE: 1
    healthcheck:
      test: ["CMD-SHELL", "test -e /run/gsa/copying.done"]
      start_period: 5s
    volumes:
      - gsa_data_vol:/mnt/web

  gsad:
    image: registry.community.greenbone.net/community/gsad:stable
    # image: ghcr.io/greenbone/gsad:stable
    restart: unless-stopped
    environment:
      # --port=80 is explicit so nginx can use http://gsad:80 as the upstream.
      # Without it, gsad's default binding is version-dependent (some builds
      # default to 443 even with --http-only) and you get connection-refused
      # from nginx.
      GSAD_ARGS: "--listen=0.0.0.0 --port=80 --http-only --api-only -f"
    volumes:
      - gvmd_socket_vol:/run/gvmd
    depends_on:
      gvmd:
        condition: service_started

  nginx:
    image: registry.community.greenbone.net/community/nginx:latest
    # image: ghcr.io/greenbone/nginx:latest
    restart: unless-stopped
    ports:
      - "${GVM_GSA_PORT:-9392}:9392"
    volumes:
      # Custom HTTP-only config — bypasses the auto-generated HTTPS redirect
      # from `gvm-config`. To re-enable HTTPS, restore the `gvm-config`
      # service from git history and point this at `nginx_config_vol`.
      - ./docker/gvm-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - gsa_data_vol:/usr/share/nginx/html:ro
    depends_on:
      gsa:
        condition: service_healthy
      gsad:
        condition: service_started

  # ── OPM GVM Scanner Agent ──────────────────────────────────────────────
  opm-scanner-gvm:
    build:
      context: ./scanner
      dockerfile: Dockerfile.gvm
    # Or use a pre-built image (production):
    # image: styliteag/opm-scanner-gvm:latest
    # image: ghcr.io/styliteag/opm-scanner-gvm:latest
    restart: unless-stopped
    environment:
      BACKEND_URL: ${GVM_BACKEND_URL:-http://backend:8000}
      API_KEY: ${GVM_SCANNER_API_KEY:?Set GVM_SCANNER_API_KEY to the scanner API key from OPM}
      POLL_INTERVAL: ${GVM_POLL_INTERVAL:-60}
      LOG_LEVEL: ${GVM_LOG_LEVEL:-INFO}
      GVM_SOCKET: /run/gvmd/gvmd.sock
      GVM_USER: ${GVM_USER:-admin}
      GVM_PASSWORD: ${GVM_PASSWORD:-admin}
    volumes:
      - gvmd_socket_vol:/run/gvmd
    depends_on:
      gvmd:
        condition: service_started
    networks:
      - default
      # opm-network is only required in dev (compose-dev.yml), where the
      # OPM backend is in a separate compose project. Harmless in prod.
      - opm-network

volumes:
  gpg_data_vol:
  scap_data_vol:
  cert_data_vol:
  data_objects_vol:
  gvmd_data_vol:
  psql_data_vol:
  vt_data_vol:
  notus_data_vol:
  psql_socket_vol:
  gvmd_socket_vol:
  ospd_openvas_socket_vol:
  redis_socket_vol:
  openvas_data_vol:
  openvas_log_data_vol:
  gsa_data_vol:

networks:
  default:
  # External network bridging to the OPM dev stack (compose-dev.yml).
  # Only needed when the backend runs in a separate compose project; in
  # production the backend is in the same project so this is a no-op.
  opm-network:
    external: true
