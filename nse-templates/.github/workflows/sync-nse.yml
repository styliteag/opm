name: Sync NSE Scripts from Nmap

on:
  workflow_dispatch: {}
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync from nmap/nmap
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nse-templates
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync from upstream (nmap/nmap)
        run: bash tools/sync-from-nmap.sh

      - name: Build manifest
        run: python3 tools/build-manifest.py --scripts-dir scripts --output manifest.json

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(nse): sync NSE scripts from nmap/nmap"
          title: "chore(nse): update NSE scripts from upstream"
          body: |
            ## Automated NSE Script Sync

            Synchronized NSE scripts from upstream [nmap/nmap](https://github.com/nmap/nmap).

            ### Changes
            - New/updated `*.nse` scripts under `nse-templates/scripts/`
            - Regenerated `nse-templates/manifest.json`

            **Auto-generated by sync-nse workflow**
          branch: chore/sync-nse
          base: main
          delete-branch: true
          labels: |
            automation
            nse-scripts
